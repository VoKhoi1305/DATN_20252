# SMTTS Web — Nginx config
# - Serves the React SPA from /usr/share/nginx/html
# - Reverse-proxies /api/v1/* to the backend container (service name: backend)
# - Reverse-proxies /uploads/* to the backend (static files served by Nest)

upstream smtts_backend {
    server backend:3000;
    keepalive 32;
}

server {
    listen       80;
    server_name  _;

    # Generous body size for face-image uploads (base64 in JSON can be large)
    client_max_body_size 25m;

    # Gzip text assets
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/wasm image/svg+xml;

    # ---------- API proxy ----------
    location /api/ {
        proxy_pass         http://smtts_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---------- Uploaded files proxy ----------
    location /uploads/ {
        proxy_pass         http://smtts_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_valid  200 1h;
    }

    # ---------- Static assets (long cache, hashed names) ----------
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---------- SPA fallback ----------
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
