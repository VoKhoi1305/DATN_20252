name: SMTTS CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'code/backend/**'
      - 'code/web/**'
      - 'code/face-recognition/**'
      - 'code/docker/**'
      - '.github/workflows/ci-cd.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Run the deploy job after build'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ============================================================
  # 1) Detect which sub-projects changed (skip unrelated builds)
  # ============================================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      face: ${{ steps.filter.outputs.face }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'code/backend/**'
            web:
              - 'code/web/**'
            face:
              - 'code/face-recognition/**'

  # ============================================================
  # 2) Build & push Docker images to GHCR (only changed ones)
  # ============================================================
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./code/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/smtts-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/smtts-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./code/web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/smtts-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/smtts-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-face:
    needs: changes
    if: needs.changes.outputs.face == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./code/face-recognition
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/smtts-face:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/smtts-face:${{ github.sha }}
          cache-from: type=gha,scope=face
          cache-to: type=gha,mode=max,scope=face

  # ============================================================
  # 3) Deploy: SSH into the server and pull the new images
  # ============================================================
  deploy:
    needs: [build-backend, build-web, build-face]
    # Run even if some build jobs were skipped (no changes there)
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (github.event_name != 'workflow_dispatch' || inputs.deploy)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all
            git reset --hard origin/main
            export IMAGE_TAG=${{ github.sha }}
            cd code/docker
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans
            docker image prune -f
